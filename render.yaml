services:
  # The FastAPI Backend
  - type: web
    name: crm-hcp-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Ensures modern Python version for compatibility
      - key: DATABASE_URL
        fromDatabase:
          name: crm-hcp-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # User will set this securely in the Render dashboard

databases:
  # The PostgreSQL Database
  - name: crm-hcp-db
    databaseName: crm_prod
    user: admin
